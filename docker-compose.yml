version: '3.8'

services:
  frontend:
    build: ./Frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: ./Backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/openbarber
      - SPRING_DATASOURCE_USERNAME=postgres
    env_file:
      - ./Backend/src/main/resources/.env

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=openbarber
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openbarber"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
