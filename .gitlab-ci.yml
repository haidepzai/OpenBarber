stages:
  - test
  - build
  - deploy

# ─── Backend: Test ──────────────────────────────────────────────────────────
backend-test:
  stage: test
  image: eclipse-temurin:17-jdk
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_DB: openbarber_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openbarber_test
    SPRING_DATASOURCE_USERNAME: postgres
    SPRING_DATASOURCE_PASSWORD: postgres
    DDL_AUTO: create-drop
    JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-hmac
    MAIL_USERNAME: test@test.com
    MAIL_PASSWORD: test
    MJML_APP_ID: test
    MJML_APP_KEY: test
    APP_FRONTEND_URL: http://localhost:3000
  cache:
    key: backend-maven
    paths:
      - .m2/repository
  before_script:
    - cd Backend
    - chmod +x mvnw
  script:
    - ./mvnw test --no-transfer-progress -Dmaven.repo.local=../.m2/repository
  artifacts:
    when: always
    reports:
      junit: Backend/target/surefire-reports/TEST-*.xml
    paths:
      - Backend/target/surefire-reports/
    expire_in: 1 week
  rules:
    - changes:
        - Backend/**/*
    - if: $CI_COMMIT_BRANCH == "main"

# ─── Backend: Build ─────────────────────────────────────────────────────────
backend-build:
  stage: build
  image: eclipse-temurin:17-jdk
  cache:
    key: backend-maven
    paths:
      - .m2/repository
  before_script:
    - cd Backend
    - chmod +x mvnw
  script:
    - ./mvnw clean package -DskipTests --no-transfer-progress -Dmaven.repo.local=../.m2/repository
  artifacts:
    paths:
      - Backend/target/*.jar
    expire_in: 1 hour
  needs:
    - job: backend-test
      optional: true
  rules:
    - changes:
        - Backend/**/*
    - if: $CI_COMMIT_BRANCH == "main"

# ─── Frontend: Build ────────────────────────────────────────────────────────
frontend-build:
  stage: build
  image: node:18-alpine
  variables:
    CI: "false"
    VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    VITE_GOOGLE_API: ${VITE_GOOGLE_API}
    VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY}
  cache:
    key: frontend-npm
    paths:
      - Frontend/node_modules
  before_script:
    - cd Frontend
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - Frontend/build
    expire_in: 1 hour
  rules:
    - changes:
        - Frontend/**/*
    - if: $CI_COMMIT_BRANCH == "main"

# ─── Deploy: Backend → Railway ──────────────────────────────────────────────
deploy-backend:
  stage: deploy
  image: node:18-alpine
  before_script:
    - npm install -g @railway/cli
  script:
    - railway up --service $RAILWAY_SERVICE_ID --detach
  needs:
    - job: backend-build
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: production/backend
    url: $RAILWAY_PUBLIC_URL

# ─── Deploy: Frontend → Vercel ──────────────────────────────────────────────
deploy-frontend:
  stage: deploy
  image: node:18-alpine
  before_script:
    - npm install -g vercel
  script:
    - cd Frontend
    - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
    - vercel build --prod --token=$VERCEL_TOKEN
    - vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
  needs:
    - job: frontend-build
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: production/frontend
    url: $VERCEL_URL


