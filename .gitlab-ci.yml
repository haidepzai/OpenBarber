  stage: build
  image: node:18-alpine
  variables:
    CI: "false"
    REACT_APP_BACKUP_IMAGE: https://placehold.co/400
    REACT_APP_GOOGLE_API: placeholder
  cache:
    key: frontend-npm
    paths:
      - Frontend/node_modules
  before_script:
    - cd Frontend
