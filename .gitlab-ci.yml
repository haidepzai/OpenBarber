stages:
  - build

# ─── Backend ────────────────────────────────────────────────────────────────
backend-build:
  stage: build
  image: eclipse-temurin:17-jdk
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_DB: openbarber_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openbarber_test
    SPRING_DATASOURCE_USERNAME: postgres
    SPRING_DATASOURCE_PASSWORD: postgres
    DDL_AUTO: create-drop
    JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-hmac
    MAIL_USERNAME: test@test.com
    MAIL_PASSWORD: test
    MJML_APP_ID: test
    MJML_APP_KEY: test
    APP_FRONTEND_URL: http://localhost:3000
  cache:
    key: backend-maven
    paths:
      - .m2/repository
  before_script:
    - cd Backend
    - chmod +x mvnw
  script:
    - ./mvnw clean package --no-transfer-progress -Dmaven.repo.local=../.m2/repository
  artifacts:
    paths:
      - Backend/target/*.jar
    expire_in: 1 hour
  only:
    changes:
      - Backend/**/*

# ─── Frontend ───────────────────────────────────────────────────────────────
frontend-build:
  stage: build
  image: node:18-alpine
  variables:
    CI: "false"
    REACT_APP_BACKUP_IMAGE: https://placehold.co/400
    REACT_APP_GOOGLE_API: placeholder
  cache:
    key: frontend-npm
    paths:
      - Frontend/node_modules
  before_script:
    - cd Frontend
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - Frontend/build
    expire_in: 1 hour
  only:
    changes:
      - Frontend/**/*
