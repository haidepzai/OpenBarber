stages:
  - test
  - build

# ─── Backend: Test ──────────────────────────────────────────────────────────
backend-test:
  stage: test
  image: eclipse-temurin:17-jdk
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_DB: openbarber_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openbarber_test
    SPRING_DATASOURCE_USERNAME: postgres
    SPRING_DATASOURCE_PASSWORD: postgres
    DDL_AUTO: create-drop
    JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-hmac
    MAIL_USERNAME: test@test.com
    MAIL_PASSWORD: test
    MJML_APP_ID: test
    MJML_APP_KEY: test
    APP_FRONTEND_URL: http://localhost:3000
  cache:
    key: backend-maven
    paths:
      - .m2/repository
  before_script:
    - cd Backend
    - chmod +x mvnw
  script:
    - ./mvnw test --no-transfer-progress -Dmaven.repo.local=../.m2/repository
  artifacts:
    when: always
    reports:
      junit: Backend/target/surefire-reports/TEST-*.xml
    paths:
      - Backend/target/surefire-reports/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Backend/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# ─── Frontend: Lint & Typecheck ─────────────────────────────────────────────
frontend-lint:
  stage: test
  image: node:18-alpine
  cache:
    key: frontend-npm
    paths:
      - Frontend/node_modules
  before_script:
    - cd Frontend
  script:
    - npm ci
    - npm run prettier -- --check
    - npm run typecheck
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Frontend/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# ─── Backend: Build ─────────────────────────────────────────────────────────
backend-build:
  stage: build
  image: eclipse-temurin:17-jdk
  cache:
    key: backend-maven
    paths:
      - .m2/repository
  before_script:
    - cd Backend
    - chmod +x mvnw
  script:
    - ./mvnw clean package -DskipTests --no-transfer-progress -Dmaven.repo.local=../.m2/repository
  artifacts:
    paths:
      - Backend/target/*.jar
    expire_in: 1 hour
  needs:
    - job: backend-test
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Backend/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# ─── Frontend: Build ────────────────────────────────────────────────────────
frontend-build:
  stage: build
  image: node:18-alpine
  variables:
    CI: "false"
    VITE_BACKEND_URL: $VITE_BACKEND_URL
    VITE_GOOGLE_API: $VITE_GOOGLE_API
    VITE_RECAPTCHA_SITE_KEY: $VITE_RECAPTCHA_SITE_KEY
  cache:
    key: frontend-npm
    paths:
      - Frontend/node_modules
  before_script:
    - cd Frontend
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - Frontend/build
    expire_in: 1 hour
  needs:
    - job: frontend-lint
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Frontend/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
